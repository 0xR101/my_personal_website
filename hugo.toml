baseURL = "https://0xR101.github.io/my_personal_website/"
languageCode = "en-us"
title = "Rayyan Raza"
theme = "ink"
[params]
  author = "Rayyan Raza"
  description = "Physics Researcher"
  homeTitle = "Rayyan Raza"
  homeSubtitle = "Physics Researcher"
  homeBio = "I am a physics researcher specializing in theoretical physics, exploring complex systems, and writing about my academic journey."
  homeImage = "/images/avatar.jpg"    # Avatar on homepage (place in static/images/, renders as 110px circle)
  favicon = "/favicon.ico"            # Place in static/
  recentPostsCount = 3                # Posts shown on homepage (default: 3)             # Posts shown on homepage (default: 3)

  # Social links — displayed in the homepage hero section
  [[params.socialLinks]]
    name = "GitHub"
    url = "https://github.com/0xR101" # Dynamically updated based on your baseURL
    external = true                   # Opens in new tab with external link indicator
  
  [[params.socialLinks]]
    name = "LinkedIn"
    url = "https://linkedin.com/in/rayyan-raza" # Update with your exact LinkedIn vanity URL
    external = true
  
  [[params.socialLinks]]
    name = "Email"
    url = "mailto:contact@rayyanraza.com" # Recommended: Use a custom domain email or a professional primary address
  
  [[params.socialLinks]]
    name = "Blog"
    url = "/posts/"

  # Ask AI buttons — shown on homepage, configurable
  # Use PROMPT in URL for tools with native query support
  [[params.askAI]]
    name = "Claude"
    url = "https://claude.ai/new"
  
  [[params.askAI]]
    name = "ChatGPT"
    url = "https://chatgpt.com/"
  
  [[params.askAI]]
    name = "Perplexity"
    url = "https://perplexity.ai/search?q=PROMPT"

# Navigation menu
[menu]
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 1
  
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 2
  
  [[menu.main]]
    name = "Papers & Books"
    url = "/publications/" 
    weight = 3
  
  [[menu.main]]
    name = "Achievements"
    url = "/achievements/"
    weight = 4
# Output formats — enables llms.txt generation and JSON for site search
[outputs]
  home = ["HTML", "RSS", "llmstxt", "JSON"]

[outputFormats.llmstxt]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true
  notAlternative = true

# Related posts — powers the "Related Posts" section on blog entries
[related]
  includeNewer = true
  threshold = 80
  toLower = true
  
  [[related.indices]]
    name = "tags"
    weight = 100
  
  [[related.indices]]
    name = "date"
    weight = 10